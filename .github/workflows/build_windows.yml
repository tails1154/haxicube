name: Build latest (Windows)
# trigger via either push to selected branches or on manual run
on:
  push:
    branches:
      - main
      - master
      - ModernLighting
      - AngledLighting
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-windows
  cancel-in-progress: true

jobs:
#============================================
# ============== 32 BIT WINDOWS =============
# ===========================================
  build-32:
    timeout-minutes: 10
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install packages
        shell: bash
        run: |
          sudo apt-get -y install gcc-mingw-w64-i686

      - name: Compile 32 bit Windows builds
        shell: bash
        run: |
          LATEST_FLAG=-DCC_COMMIT_SHA=\\\"${GITHUB_SHA::9}\\\"

          COMMON_CFLAGS="-fno-stack-protector -DCC_NOMAIN -fno-ident $LATEST_FLAG"
          COMMON_LDFLAGS="-nostartfiles -Wl,-e_main_real misc/windows/CCicon_32.res"

          make mingw RELEASE=1 TARGET=cc-w32-d3d9 CC=i686-w64-mingw32-gcc \
                EXTRA_CFLAGS="$COMMON_CFLAGS" \
                EXTRA_LDFLAGS="$COMMON_LDFLAGS"

          make mingw clean
          make mingw RELEASE=1 TARGET=cc-w32-d3d11 CC=i686-w64-mingw32-gcc \
                EXTRA_CFLAGS="$COMMON_CFLAGS -DCC_GFX_BACKEND=CC_GFX_BACKEND_D3D11" \
                EXTRA_LDFLAGS="$COMMON_LDFLAGS"

          make mingw clean
          make mingw RELEASE=1 TARGET=cc-w32-ogl CC=i686-w64-mingw32-gcc \
                EXTRA_CFLAGS="$COMMON_CFLAGS -DCC_GFX_BACKEND=CC_GFX_BACKEND_GL1" \
                EXTRA_LDFLAGS="$COMMON_LDFLAGS"
          
          # mingw defaults to i686, but some really old CPUs only support i586
          make mingw clean
          make mingw RELEASE=1 TARGET=cc-w9x-ogl CC=i686-w64-mingw32-gcc \
                EXTRA_CFLAGS="$COMMON_CFLAGS -march=i586 -DCC_BUILD_NOSTDLIB -DCC_GFX_BACKEND=CC_GFX_BACKEND_GL1" \
                EXTRA_LDFLAGS="$COMMON_LDFLAGS"
          
          
      - uses: actions/upload-artifact@v4
        with:
          path: 'cc-w32-d3d9.exe'
          name: 'ClassiCube-Win32-Direct3D9.exe'
          
      - uses: actions/upload-artifact@v4
        with:
          path: 'cc-w32-ogl.exe'
          name: 'ClassiCube-Win32-OpenGL.exe'
          
      - uses: actions/upload-artifact@v4
        with:
          path: 'cc-w32-d3d11.exe'
          name: 'ClassiCube-Win32-Direct3D11.exe'
          
      - uses: actions/upload-artifact@v4
        with:
          path: 'cc-w9x-ogl.exe'
          name: 'ClassiCube-Win9x.exe'
          
          


          
          
#============================================
# ============== 64 BIT WINDOWS =============
# ===========================================
  build-64:
    timeout-minutes: 10
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install packages
        shell: bash
        run: |
          sudo apt-get -y install gcc-mingw-w64-x86-64

      - name: Compile 64 bit Windows builds
        shell: bash
        run: |
          LATEST_FLAG=-DCC_COMMIT_SHA=\\\"${GITHUB_SHA::9}\\\"

          COMMON_CFLAGS="-fno-stack-protector -DCC_NOMAIN -fno-ident $LATEST_FLAG"
          COMMON_LDFLAGS="-nostartfiles -Wl,-emain_real misc/windows/CCicon_64.res"

          make mingw RELEASE=1 TARGET=cc-w64-d3d9 CC=x86_64-w64-mingw32-gcc \
                EXTRA_CFLAGS="$COMMON_CFLAGS" \
                EXTRA_LDFLAGS="$COMMON_LDFLAGS"

          make mingw clean
          make mingw RELEASE=1 TARGET=cc-w64-d3d11 CC=x86_64-w64-mingw32-gcc \
                EXTRA_CFLAGS="$COMMON_CFLAGS -DCC_GFX_BACKEND=CC_GFX_BACKEND_D3D11" \
                EXTRA_LDFLAGS="$COMMON_LDFLAGS"

          make mingw clean
          make mingw RELEASE=1 TARGET=cc-w64-ogl CC=x86_64-w64-mingw32-gcc \
                EXTRA_CFLAGS="$COMMON_CFLAGS -DCC_GFX_BACKEND=CC_GFX_BACKEND_GL1" \
                EXTRA_LDFLAGS="$COMMON_LDFLAGS"
          
          
      - uses: actions/upload-artifact@v4
        with:
          path: 'cc-w64-d3d9.exe'
          name: 'ClassiCube-Win64-Direct3D9.exe'
          
      - uses: actions/upload-artifact@v4
        with:
          path: 'cc-w64-ogl.exe'
          name: 'ClassiCube-Win64-OpenGL.exe'
          
      - uses: actions/upload-artifact@v4
        with:
          path: 'cc-w64-d3d11.exe'
          name: 'ClassiCube-Win64-Direct3D11.exe'
          
          
          
          
