name: Build latest (Linux)
# trigger via either push to selected branches or on manual run
on:
  push:
    branches:
      - main
      - master
      - ModernLighting
      - AngledLighting
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-linux
  cancel-in-progress: true

jobs:
#============================================
# =============== 32 BIT LINUX ==============
# ===========================================
  build-32:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    steps:
      - uses: actions/checkout@v5

      - name: Install packages
        shell: bash
        run: |
          apt-get -y update
          apt-get -y install gcc-multilib wget curl unzip make

      - name: Retrieve dependencies
        shell: bash
        run: |
          wget https://github.com/ClassiCube/rpi-compiling-stuff/raw/main/linux32.zip
          unzip linux32.zip

      - name: Compile 32 bit Linux builds
        shell: bash
        run: |
          LATEST_FLAG=-DCC_COMMIT_SHA=\\\"${GITHUB_SHA::9}\\\"

          COMMON_CFLAGS="-m32 -fno-stack-protector -fno-pie -fcf-protection=none -U_FORTIFY_SOURCE -DFORCE_OLD_CLOCKGETTIME_X86 $LATEST_FLAG"
          COMMON_LDFLAGS="-m32 -s -no-pie -L ./lib -Wl,--unresolved-symbols=ignore-in-shared-libs"

          make linux RELEASE=1 TARGET=cc-nix32-gl1 \
                EXTRA_CFLAGS="$COMMON_CFLAGS" \
                EXTRA_LDFLAGS="$COMMON_LDFLAGS"

          make linux clean
          make linux RELEASE=1 TARGET=cc-nix32-gl2 \
                EXTRA_CFLAGS="$COMMON_CFLAGS -DCC_GFX_BACKEND=CC_GFX_BACKEND_GL2" \
                EXTRA_LDFLAGS="$COMMON_LDFLAGS"

      
      - uses: ./.github/actions/upload_build
        with:
          SOURCE_FILE: 'cc-nix32-gl1'
          DEST_NAME: 'ClassiCube-Linux32-OpenGL'
          
      - uses: ./.github/actions/upload_build
        with:
          SOURCE_FILE: 'cc-nix32-gl2'
          DEST_NAME: 'ClassiCube-Linux32-ModernGL'
          
          
      - uses: ./.github/actions/notify_success
        with:
          DESTINATION_URL: '${{ secrets.NOTIFY_URL }}'
          WORKFLOW_NAME: 'linux32'


      - uses: ./.github/actions/notify_failure
        if: failure()
        with:
          NOTIFY_MESSAGE: 'Failed to produce 32 bit Linux build'
          WEBHOOK_URL: '${{ secrets.WEBHOOK_URL }}'

#============================================
# =============== 64 BIT LINUX ==============
# ===========================================
  build-64:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    steps:
      - uses: actions/checkout@v5

      - name: Install packages
        shell: bash
        run: |
          apt-get -y update
          apt-get -y install gcc wget curl unzip make

      - name: Retrieve dependencies
        shell: bash
        run: |
          wget https://github.com/ClassiCube/rpi-compiling-stuff/raw/main/linux64.zip
          unzip linux64.zip

      - name: Compile 64 bit Linux builds
        shell: bash
        run: |
          LATEST_FLAG=-DCC_COMMIT_SHA=\\\"${GITHUB_SHA::9}\\\"

          COMMON_CFLAGS="-m64 -fno-stack-protector -fno-pie -fcf-protection=none -U_FORTIFY_SOURCE $LATEST_FLAG"
          COMMON_LDFLAGS="-m64 -s -no-pie -L ./lib -Wl,--unresolved-symbols=ignore-in-shared-libs"

          make linux RELEASE=1 TARGET=cc-nix64-gl1 \
                EXTRA_CFLAGS="$COMMON_CFLAGS" \
                EXTRA_LDFLAGS="$COMMON_LDFLAGS"

          make linux clean
          make linux RELEASE=1 TARGET=cc-nix64-gl2 \
                EXTRA_CFLAGS="$COMMON_CFLAGS -DCC_GFX_BACKEND=CC_GFX_BACKEND_GL2" \
                EXTRA_LDFLAGS="$COMMON_LDFLAGS"
          #gcc ${{ env.SRCS }} ${{ env.FLAGS }} ${{ env.NIX64_FLAGS }} $LATEST_FLAG -DCC_GFX_BACKEND=CC_GFX_BACKEND_GL2 -DCC_WIN_BACKEND=CC_WIN_BACKEND_SDL2 -o cc-sdl64-gl2 -lSDL2  ${{ env.LIBS }}

          
      - uses: ./.github/actions/upload_build
        with:
          SOURCE_FILE: 'cc-nix64-gl1'
          DEST_NAME: 'ClassiCube-Linux64-OpenGL'
          
      - uses: ./.github/actions/upload_build
        with:
          SOURCE_FILE: 'cc-nix64-gl2'
          DEST_NAME: 'ClassiCube-Linux64-ModernGL'
          
#      - uses: ./.github/actions/upload_build
#        with:
#          SOURCE_FILE: 'cc-sdl64-gl2'
#          DEST_NAME: 'ClassiCube-Linux64-SDL2'
          
          
      - uses: ./.github/actions/notify_success
        with:
          DESTINATION_URL: '${{ secrets.NOTIFY_URL }}'
          WORKFLOW_NAME: 'linux64'


      - uses: ./.github/actions/notify_failure
        if: failure()
        with:
          NOTIFY_MESSAGE: 'Failed to produce 64 bit Linux build'
          WEBHOOK_URL: '${{ secrets.WEBHOOK_URL }}'
